<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>刘乐乐出来约会啦</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="card screen active intro-card" id="screen-intro">
      <div class="petals" aria-hidden="true">
        <span>🌸</span><span>🌸</span><span>💕</span><span>✨</span><span>🌸</span>
      </div>
      <div class="kitty-icon" aria-hidden="true">
        <span class="kitty-ear left"></span>
        <span class="kitty-ear right"></span>
        <span class="kitty-face">
          <i class="kitty-eye left"></i>
          <i class="kitty-eye right"></i>
          <i class="kitty-nose"></i>
          <i class="kitty-whisker w1"></i>
          <i class="kitty-whisker w2"></i>
          <i class="kitty-whisker w3"></i>
          <i class="kitty-whisker w4"></i>
        </span>
        <span class="kitty-bow"><i></i></span>
      </div>
      <h1 class="romantic-title">刘乐乐出来约会啦!</h1>
      <p id="inviteText">阿阳发出了邀请</p>
      <div class="actions">
        <button class="btn primary" id="acceptBtn" type="button">愿意 ♡</button>
        <button class="btn ghost" id="declineBtn" type="button">不要 🙈</button>
      </div>
    </section>

    <section class="card screen weather-card weather-rain" id="screen-weather">
      <div class="weather-fx" id="weatherFx" aria-hidden="true"></div>
      <div class="cloud cloud-left" aria-hidden="true">☁️</div>
      <div class="cloud cloud-right" aria-hidden="true">☁️</div>
      <div class="weather-content">
        <div class="pixel-icon" id="weatherIcon" aria-hidden="true">🌧️</div>
        <h1 id="weatherTitle">约会当天天气预报</h1>
        <div class="weather-panel">
          <div class="weather-main">
            <span id="weatherLabel">小雨转多云</span>
            <strong id="weatherTemp">22°C</strong>
          </div>
          <div class="weather-emoji" id="weatherEmoji" aria-hidden="true">🌧️</div>
          <div class="weather-feels">
            <span>体感温度</span>
            <strong id="weatherFeels">20°C</strong>
          </div>
          <dl class="weather-stats">
            <div><dt>湿度</dt><dd id="weatherHumidity">78%</dd></div>
            <div><dt>风速</dt><dd id="weatherWind">12km/h</dd></div>
            <div><dt>降雨概率</dt><dd id="weatherAir">65%</dd></div>
          </dl>
        </div>
        <button class="btn primary" data-next="screen-food" type="button">继续选吃的</button>
      </div>
    </section>

    <section class="card screen time-card" id="screen-time">
      <div class="sparkles" aria-hidden="true"><span>✦</span><span>✦</span><span>✦</span></div>
      <div class="pixel-icon" aria-hidden="true">🗓️</div>
      <h1>规划一下时间 🕘</h1>
      <form id="timeForm">
        <label for="dateInput">选一天</label>
        <input id="dateInput" type="date" required />
        <label for="timeInput">几点见?</label>
        <input id="timeInput" type="time" value="17:00" required />
        <button class="btn primary" type="submit">就定这个时间</button>
      </form>
    </section>

    <section class="card screen choices-card" id="screen-food">
      <div class="pixel-icon small" aria-hidden="true">🍜</div>
      <h1>想吃什么？ <small>（可多选）</small></h1>
      <div class="choice-grid" id="foodGrid">
        <button data-food="中餐" type="button"><span>中餐</span><b>🥟</b></button>
        <button data-food="日料" type="button"><span>日料</span><b>🍣</b></button>
        <button data-food="韩餐" type="button"><span>韩餐</span><b>🍲</b></button>
        <button data-food="泰国菜" type="button"><span>泰国菜</span><b>🍛</b></button>
        <button data-food="越南菜" type="button"><span>越南菜</span><b>🍜</b></button>
        <button data-food="印度菜" type="button"><span>印度菜</span><b>🍛</b></button>
        <button data-food="意大利菜" type="button"><span>意大利菜</span><b>🇮🇹</b></button>
        <button data-food="法国菜" type="button"><span>法国菜</span><b>🇫🇷</b></button>
        <button data-food="希腊菜" type="button"><span>希腊菜</span><b>💗</b></button>
        <button data-food="墨西哥菜" type="button"><span>墨西哥菜</span><b>🌮</b></button>
        <button data-food="西班牙海鲜饭" type="button"><span>西班牙海鲜饭</span><b>🥘</b></button>
        <button data-food="甜品" type="button"><span>甜品</span><b>🍰</b></button>
      </div>
      <div class="custom-row">
        <input id="customFood" maxlength="40" placeholder="其他（自定义）" />
        <button class="custom-add" id="useCustomFood" type="button" aria-label="添加自定义食物">✎</button>
      </div>
      <button class="btn primary next-choice" id="foodNext" type="button" disabled>下一步</button>
    </section>

    <section class="card screen choices-card" id="screen-activity">
      <div class="pixel-icon small" aria-hidden="true">🍿</div>
      <h1>想做什么？ <small>（可多选）</small></h1>
      <div class="choice-grid" id="activityGrid">
        <button data-activity="看电影" type="button"><span>看电影</span><b>🎬</b></button>
        <button data-activity="咖啡厅" type="button"><span>咖啡厅</span><b>☕</b></button>
        <button data-activity="公园放松" type="button"><span>公园放松</span><b>🌳</b></button>
        <button data-activity="购物" type="button"><span>购物</span><b>🛍️</b></button>
        <button data-activity="打球" type="button"><span>打球</span><b>🏸</b></button>
        <button data-activity="逛超市" type="button"><span>逛超市</span><b>🛒</b></button>
        <button data-activity="看展" type="button"><span>看展</span><b>🖼️</b></button>
        <button data-activity="唱歌" type="button"><span>唱歌</span><b>🎤</b></button>
        <button data-activity="散步" type="button"><span>散步</span><b>🚶</b></button>
        <button data-activity="玩游戏" type="button"><span>玩游戏</span><b>🎮</b></button>
        <button data-activity="拍照" type="button"><span>拍照</span><b>📷</b></button>
        <button data-activity="看夜景" type="button"><span>夜景</span><b>🌃</b></button>
        <button data-activity="书店" type="button"><span>书店</span><b>📚</b></button>
        <button data-activity="游乐园" type="button"><span>游乐园</span><b>🎢</b></button>
        <button data-activity="做手工" type="button"><span>做手工</span><b>🎨</b></button>
      </div>
      <div class="custom-row">
        <input id="customActivity" maxlength="40" placeholder="其他（自定义）" />
        <button class="custom-add" id="useCustomActivity" type="button" aria-label="添加自定义活动">✎</button>
      </div>
      <button class="btn primary next-choice" id="activityNext" type="button" disabled>完成约会计划</button>
    </section>

    <section class="screen final-screen" id="screen-final">
      <div class="final-kitty" aria-hidden="true">
        <span class="final-kitty-ear left"></span>
        <span class="final-kitty-ear right"></span>
        <span class="final-kitty-face">
          <i class="final-kitty-eye left"></i>
          <i class="final-kitty-eye right"></i>
          <i class="final-kitty-nose"></i>
          <i class="final-kitty-whisker w1"></i>
          <i class="final-kitty-whisker w2"></i>
          <i class="final-kitty-whisker w3"></i>
          <i class="final-kitty-whisker w4"></i>
        </span>
        <span class="final-kitty-bow"><i></i></span>
      </div>
      <div class="final-title">See Lia<br />Soon~</div>
      <div class="ticket">
        <div>
          <span>🗓️ 日期</span>
          <strong id="finalDate">—</strong>
        </div>
        <div>
          <span>🕘 时间</span>
          <strong id="finalTime">—</strong>
        </div>
        <div>
          <span>🍜 吃的</span>
          <strong id="finalFood">—</strong>
        </div>
        <div>
          <span>🎬 活动</span>
          <strong id="finalActivity">—</strong>
        </div>
      </div>
      <button class="share-btn" id="restartBtn" type="button" aria-label="重新开始">↻</button>
    </section>
  </main>

  <audio id="bgmAudio" src="assets/heat-waves.flac" loop preload="auto"></audio>
  <button class="music-toggle" id="musicToggle" type="button" aria-label="播放或暂停背景音乐">♪</button>
  <div class="toast" id="toast" role="status" aria-live="polite">这个按钮会逃跑 😝</div>
  <script src="script.js"></script>
</body>
</html>
